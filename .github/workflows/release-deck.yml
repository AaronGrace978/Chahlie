name: Release Steam Deck

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deck-release:
    if: ${{ !contains(github.ref_name, '-tauri') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release tarball
        run: |
          chmod +x scripts/build-deck-release.sh release/*.sh
          bash scripts/build-deck-release.sh

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chahlie-deck-*-linux-x86_64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: chahlie-deck-linux
          path: dist/chahlie-deck-*-linux-x86_64.tar.gz
