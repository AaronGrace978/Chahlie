name: Release Chahlie Tauri

on:
  push:
    tags:
      - "v*-tauri"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf python3 python3-pip python3-venv

      - name: Install Python deps
        run: pip install -r requirements-tauri.txt

      - name: Build Tauri app
        run: |
          chmod +x scripts/build-tauri-release.sh
          export CHAHLIE_ROOT="$PWD"
          bash scripts/build-tauri-release.sh

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chahlie-tauri/src-tauri/target/release/bundle/**/*.AppImage
            chahlie-tauri/src-tauri/target/release/bundle/**/*.deb
            release/Launch-Chahlie-Tauri.sh
            scripts/install-tauri-deck.sh
            release/DECK-INSTALL.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
